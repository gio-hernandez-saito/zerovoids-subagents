name: "[Push] Validate"

on:
  push:
    branches: [main]
    tags-ignore: ['v*']

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/validate.cjs
      - run: node scripts/build.cjs
