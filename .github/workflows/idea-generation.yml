name: "Idea Generation (Mon/Thu)"

on:
  schedule:
    # 월요일, 목요일 KST 오전 9시 (UTC 0시)
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cosmos
        uses: actions/checkout@v4
        with:
          path: cosmos

      - name: Checkout idea-bank
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zerovoids-idea-bank
          path: idea-bank
          token: ${{ secrets.IDEA_BANK_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd cosmos
          pnpm install

      - name: Generate idea
        id: generate
        run: |
          cd cosmos
          # Capture stdout and stderr separately; probe prints JSON as the last stdout line
          set +e
          RESULT=$(pnpm run probe:idea-generator-critic --json --ideas-dir ../idea-bank/ideas 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Probe failed with exit code $EXIT_CODE"
            echo "$RESULT" | tail -30
            echo "success=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract the last line (JSON output) from stdout
          JSON_LINE=$(echo "$RESULT" | grep '^\s*{' | tail -1)

          if [ -z "$JSON_LINE" ] || ! echo "$JSON_LINE" | jq empty 2>/dev/null; then
            echo "::error::Probe did not return valid JSON"
            echo "$RESULT" | tail -15
            echo "success=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "success=true" >> $GITHUB_OUTPUT

          # Use a delimiter to safely pass multiline JSON
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          {
            echo "result<<${EOF_MARKER}"
            echo "$JSON_LINE"
            echo "${EOF_MARKER}"
          } >> $GITHUB_OUTPUT

      - name: Process result
        if: steps.generate.outputs.success == 'true'
        run: |
          cd idea-bank

          RESULT='${{ steps.generate.outputs.result }}'
          STATUS=$(echo "$RESULT" | jq -r '.status')
          FILENAME=$(echo "$RESULT" | jq -r '.filename')

          if [ "$STATUS" = "pass" ]; then
            echo "$RESULT" | jq -r '.content' > "ideas/$FILENAME"
            echo "Idea passed: $FILENAME"
          else
            echo "Idea failed evaluation — not saved"
          fi

      - name: Commit and push
        run: |
          cd idea-bank
          git config user.name "gio-hernandez-saito"
          git config user.email "gio.hernandez.saito@gmail.com"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: new idea $(date +%Y-%m-%d)"
            git push
          fi
