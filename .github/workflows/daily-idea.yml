name: "Daily Idea Generation"

on:
  schedule:
    # 매일 KST 오전 9시 (UTC 0시)
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout subagents
        uses: actions/checkout@v4
        with:
          path: subagents

      - name: Checkout idea-bank
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zerovoids-idea-bank
          path: idea-bank
          token: ${{ secrets.IDEA_BANK_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd subagents
          pnpm install

      - name: Generate idea
        id: generate
        run: |
          cd subagents
          RESULT=$(pnpm run probe:idea-generator-critic --json 2>/dev/null | tail -1)
          echo "result=$RESULT" >> $GITHUB_OUTPUT

      - name: Process result
        run: |
          cd idea-bank

          YEAR=$(date +%Y)
          MONTH=$(date +%m)

          STATUS=$(echo '${{ steps.generate.outputs.result }}' | jq -r '.status')
          FILENAME=$(echo '${{ steps.generate.outputs.result }}' | jq -r '.filename')
          CONTENT=$(echo '${{ steps.generate.outputs.result }}' | jq -r '.content')

          if [ "$STATUS" = "pass" ]; then
            mkdir -p "ideas/$YEAR/$MONTH"
            echo "$CONTENT" > "ideas/$YEAR/$MONTH/$FILENAME"
            echo "Idea passed"
          else
            mkdir -p "archive/failed"
            echo "$CONTENT" > "archive/failed/$FILENAME"
            echo "Idea failed"
          fi

      - name: Commit and push
        run: |
          cd idea-bank
          git config user.name "Idea Generator Bot"
          git config user.email "bot@zerovoids.dev"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: weekly idea $(date +%Y-%m-%d)"
            git push
          fi
